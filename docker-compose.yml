services:
  # ==========================================
  # APLICACIÓN PRINCIPAL (DJANGO)
  # ==========================================
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - API_MOVIES_URL=http://movies-api:8080
      - API_MOVIES_2_URL=http://movies-api-2:8080
      - API_MOVIES_3_URL=http://movies-api-3:8080
    depends_on:
      - movies-api
      - movies-api-2
      - movies-api-3

  # ==========================================
  # INSTANCIA 1: API PELÍCULAS (Puerto 8080)
  # ==========================================
  movies-api:
    build:
      context: ./service/apis/movies-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./service/apis/movies-api:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DB_USER=movies
      - DB_HOST=movies-db
      - DB_NAME=movies
      - DB_PASSWORD=movies
      - DB_PORT=5432
    depends_on:
      - movies-db

  movies-db:
    image: postgres:15
    container_name: movies-db-1
    volumes:
      - ./service/apis/movies-api/migrations/01.sql:/docker-entrypoint-initdb.d/01.sql
    environment:
      - POSTGRES_USER=movies
      - POSTGRES_PASSWORD=movies
      - POSTGRES_DB=movies
    ports:
      - "5431:5432"

  # ==========================================
  # INSTANCIA 2: API PELÍCULAS (Puerto 8081)
  # ==========================================
  movies-api-2:
    build:
      context: ./service/apis/movies-api
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - ./service/apis/movies-api:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DB_USER=movies
      - DB_HOST=movies-db-2
      - DB_NAME=movies
      - DB_PASSWORD=movies
      - DB_PORT=5432
    depends_on:
      - movies-db-2

  movies-db-2:
    image: postgres:15
    container_name: movies-db-2
    volumes:
      - ./service/apis/movies-api/migrations/02.sql:/docker-entrypoint-initdb.d/02.sql
    environment:
      - POSTGRES_USER=movies
      - POSTGRES_PASSWORD=movies
      - POSTGRES_DB=movies
    ports:
      - "5432:5432"

  # ==========================================
  # INSTANCIA 3: API PELÍCULAS (Puerto 8082)
  # ==========================================
  movies-api-3:
    build:
      context: ./service/apis/movies-api
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    volumes:
      - ./service/apis/movies-api:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DB_USER=movies
      - DB_HOST=movies-db-3
      - DB_NAME=movies
      - DB_PASSWORD=movies
      - DB_PORT=5432
    depends_on:
      - movies-db-3

  movies-db-3:
    image: postgres:15
    container_name: movies-db-3
    volumes:
      - ./service/apis/movies-api/migrations/03.sql:/docker-entrypoint-initdb.d/03.sql
    environment:
      - POSTGRES_USER=movies
      - POSTGRES_PASSWORD=movies
      - POSTGRES_DB=movies
    ports:
      - "5433:5432"