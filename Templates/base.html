{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamSync</title>
    <link rel="stylesheet" href="{% static 'css/base.css'%}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg header-pers sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="/">
                <span class="brand-emerald">StreamSync</span> 
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white px-3" href="{% url 'home' %}">Inici</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white px-3" href="#">Sobre nosaltres</a>
                    </li>
                    {% if user.is_authenticated %}

                        <li class="nav-item mt-2 mt-lg-0">
                            <a class="btn btn-emerald rounded-pill text-white px-4" >Bon dia <b> {{ user.username }} </b> </a>
                        </li>
                        <li class="nav-item ms-lg-3">
                        <form action="{% url 'logout' %}" method="post" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-emerald rounded-pill text-white px-4">Tancar sessió</button>
                        </form>
                    </li>

                    {% else %}

                        <li class="nav-item ms-lg-3">
                            <a class="btn btn-outline-light rounded-pill px-4 me-2" href=" {%url 'register'%} ">Registre</a>
                        </li>
                        <li class="nav-item mt-2 mt-lg-0">
                            <a class="btn btn-emerald rounded-pill text-white px-4" href=" {%url 'login'%} ">Iniciar sessió</a>
                        </li>

                    {% endif %}
                    
                </ul>
            </div>
        </div>
    </nav>

    <div class="container content col-9 align-self-center">
        
    </div>
    <div>
        {% block content %}

        {% endblock %}
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <footer>

    </footer>

</body>

</html>
