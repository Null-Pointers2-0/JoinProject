{% extends 'base.html' %}
{% block content %}
<div class="py-5 d-flex justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <h2 class="text-center mb-4">Inici de sessió</h2>

        <form method="post" class="auth-card p-4 p-md-5">
            {% csrf_token %}
            {% for error in form.non_field_errors %}
            <small class="text-danger d-block mb-2">{{ error }}</small>
            {% endfor %}
            <div class="mb-3">
                <label for="{{ form.username.id_for_label }}" class="form-label">Username</label>
                {{ form.username }}
            </div>
            <div class="mb-3">
                <label for="{{ form.password.id_for_label }}" class="form-label">Password</label>
                {{ form.password }}
            </div>
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <button type="submit" class="btn btn-emerald w-100">Iniciar sessió</button>
        </form>

        <p class="text-center mt-3 mb-0">
            No tens compte?
            <a href="{% url 'register' %}" class="auth-link">Registra't</a>
        </p>
    </div>
</div>
{% endblock %}
